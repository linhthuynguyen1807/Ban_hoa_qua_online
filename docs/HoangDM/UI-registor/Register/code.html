<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Verdant Market - Become a Seller</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

                        "secondary-fixed": "#b4f0c9",
                        "outline": "#75796a",
                        "secondary-container": "#b4f0c9",
                        "surface-dim": "#a9e9b6",
                        "on-primary": "#ffffff",
                        "surface-bright": "#eaffea",
                        "inverse-surface": "#00391a",
                        "tertiary-container": "#d5f5e0",
                        "on-tertiary": "#ffffff",
                        "on-background": "#00210d",
                        "on-tertiary-fixed-variant": "#314d3e",
                        "background": "#eaffea",
                        "surface-container-low": "#d1ffd8",
                        "on-surface-variant": "#44483b",
                        "surface-variant": "#b1f2be",
                        "primary-fixed": "#ceee93",

                        "on-primary-container": "#597428",
                        "primary": "#4d661c",
                        "secondary": "#31694b",
                        "surface-container-highest": "#b1f2be",
                        "on-secondary-fixed-variant": "#175034",
                        "tertiary": "#486554",
                        "inverse-on-surface": "#c3ffce",
                        "surface-container-high": "#b7f7c3",
                        "secondary-fixed-dim": "#99d4ae",
                        "on-surface": "#00210d",
                        "inverse-primary": "#b3d17a",
                        "primary-container": "#d9f99d",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#131f00",
                        "surface-tint": "#4d661c",
                        "on-error": "#ffffff",
                        "surface": "#eaffea",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#002111",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#364e03",
                        "surface-container": "#bcfdc9"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "xl": "64px",
                        "margin-desktop": "48px",
                        "lg": "40px",
                        "md": "24px",
                        "xs": "4px",
                        "gutter": "24px",
                        "sm": "12px"
                    },
                    fontFamily: {
                        "headline-lg": ["Lexend"],
                        "label-md": ["Lexend"],

                        "headline-lg-mobile": ["Lexend"],

                    },
                    fontSize: {

                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]

                }
            }
        }

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(20, 83, 45, 0.08);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen relative flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Background Image with Overlay -->
<div class="fixed inset-0 z-[-1]">
<img alt="Background" class="w-full h-full object-cover opacity-60" data-alt="A softly blurred background featuring a lush abundance of fresh, organic vegetables and fruits. The lighting is bright and natural, creating a vibrant yet gentle atmosphere. Hues of fresh greens, subtle yellows, and earthy tones blend smoothly into a bokeh effect. This visually supports a clean, health-focused, and premium 'Verdant Clarity' design system without distracting from foreground elements." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXI3IRmgnxlP40wu3VZBWTB95n6bVRjF3KQh1Pv-5XH48Y8STJ4ZhLcA33a3eOH_IwkwNCkm7JOmk-n8iXT-_i2mJyOacFPIBvruCqfBrHcKDeSqeaIwE0bgg5k-MMoWpPriFVcBs9UK0HGEtUrswXVdvZ1wg4L9MAXmHTrv0NkKLt2dCPJha71iegLIooyijHx8J2wcq1a8P-bU24RsduwbW6UaJgOlNkznz6fzkv9axaCWPuZrBRMFxy4U0VMktXNvE4uvrsZVw">
<div class="absolute inset-0 bg-surface/40"></div>
</div>
<!-- Main Registration Card -->
<div class="glass-card w-full max-w-2xl rounded-xl p-md md:p-lg relative z-10 overflow-hidden">
<!-- Header -->
<div class="text-center mb-md">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-primary mb-sm">
<span class="material-symbols-outlined text-headline-lg">storefront</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-xs">
                Trở thành Người bán trên Verdant Market
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Tham gia cộng đồng cung cấp thực phẩm sạch và tiếp cận hàng ngàn khách hàng.
            </p>
</div>
<!-- Form -->
<form class="space-y-md">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Store Name -->
<div>
<label class="block font-label-md text-label-md text-primary mb-xs" for="storeName">Tên cửa hàng/doanh nghiệp</label>
<input class="w-full bg-tertiary-container/30 border border-primary/20 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="storeName" placeholder="VD: Nông trại xanh" type="text">
</div>
<!-- Phone -->
<div>
<label class="block font-label-md text-label-md text-primary mb-xs" for="phone">Số điện thoại liên hệ</label>
<input class="w-full bg-tertiary-container/30 border border-primary/20 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="phone" placeholder="090 123 4567" type="tel">
</div>
</div>
<!-- Address -->
<div>
<label class="block font-label-md text-label-md text-primary mb-xs" for="address">Địa chỉ kinh doanh</label>
<input class="w-full bg-tertiary-container/30 border border-primary/20 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="address" placeholder="Nhập địa chỉ đầy đủ" type="text">
</div>
<!-- Email -->
<div>
<label class="block font-label-md text-label-md text-primary mb-xs" for="email">Email doanh nghiệp</label>
<input class="w-full bg-tertiary-container/30 border border-primary/20 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="email@doanhnghiep.com" type="email">
</div>
<!-- Categories -->
<div>
<label class="block font-label-md text-label-md text-primary mb-sm">Danh mục sản phẩm kinh doanh</label>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-sm">
<label class="flex items-center p-3 rounded-lg border border-primary/10 bg-white/40 hover:bg-white/60 cursor-pointer transition-colors">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30 bg-transparent" type="checkbox">
<span class="ml-3 font-body-md text-body-md text-on-surface-variant">Trái cây nội địa</span>
</label>
<label class="flex items-center p-3 rounded-lg border border-primary/10 bg-white/40 hover:bg-white/60 cursor-pointer transition-colors">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30 bg-transparent" type="checkbox">
<span class="ml-3 font-body-md text-body-md text-on-surface-variant">Trái cây nhập khẩu</span>
</label>
<label class="flex items-center p-3 rounded-lg border border-primary/10 bg-white/40 hover:bg-white/60 cursor-pointer transition-colors">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30 bg-transparent" type="checkbox">
<span class="ml-3 font-body-md text-body-md text-on-surface-variant">Rau củ hữu cơ</span>
</label>
<label class="flex items-center p-3 rounded-lg border border-primary/10 bg-white/40 hover:bg-white/60 cursor-pointer transition-colors">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30 bg-transparent" type="checkbox">
<span class="ml-3 font-body-md text-body-md text-on-surface-variant">Thực phẩm khô</span>
</label>
<label class="flex items-center p-3 rounded-lg border border-primary/10 bg-white/40 hover:bg-white/60 cursor-pointer transition-colors sm:col-span-2">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30 bg-transparent" type="checkbox">
<span class="ml-3 font-body-md text-body-md text-on-surface-variant">Combo quà tặng</span>
</label>
</div>
</div><div class="space-y-sm">
<label class="block font-label-md text-label-md text-primary mb-xs">Tải lên giấy tờ kinh doanh (GPKD, Giấy chứng nhận ATTP...)</label>
<div class="border-2 border-dashed border-primary/20 rounded-lg p-md text-center bg-white/20 hover:bg-white/40 transition-colors cursor-pointer group">
<input class="hidden" id="business-docs" multiple="" type="file">
<label class="cursor-pointer" for="business-docs">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-[40px] text-primary/60 group-hover:text-primary transition-colors">cloud_upload</span>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Kéo và thả tệp vào đây hoặc <span class="text-primary font-medium">click để chọn tệp</span>
</p>
<p class="font-label-sm text-label-sm text-on-surface-variant/60">
                    Hỗ trợ định dạng: PDF, JPG, PNG (Tối đa 5MB)
                </p>
</div>
</label>
</div>
</div>
<!-- Terms -->
<div class="flex items-start pt-sm">
<div class="flex items-center h-5">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30 bg-transparent" id="terms" type="checkbox">
</div>
<div class="ml-3 text-sm">
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                        Tôi đồng ý với <a class="text-primary hover:underline font-medium" href="#">điều khoản dành cho người bán</a> của Verdant Market.
                    </label>
</div>
</div>
<!-- CTA -->
<div class="pt-sm">
<button class="w-full bg-[#14532D] text-white font-label-md text-label-md py-4 rounded-lg hover:bg-primary transition-colors shadow-sm flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Đăng ký trở thành Người bán
                </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-lg text-center border-t border-primary/10 pt-md">
<a class="font-label-md text-label-md text-primary hover:text-on-primary-container transition-colors inline-flex items-center gap-1" href="#">
                Đã có tài khoản người bán? Đăng nhập ngay
                <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</a>
</div>
</div>
</body></html>
