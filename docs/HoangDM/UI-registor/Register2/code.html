<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">

                    "surface-bright": "#eaffea",

                    "on-background": "#00210d",

                    "background": "#eaffea",
                    "surface-variant": "#b1f2be",
                    "primary-fixed": "#ceee93",
                    "on-tertiary-container": "#557161",
                    "on-surface-variant": "#44483b",
                    "on-primary-container": "#597428",
                    "primary": "#4d661c",
                    "surface-container-highest": "#b1f2be",
                    "secondary": "#31694b",
                    "tertiary": "#486554",
                    "on-secondary-fixed-variant": "#175034",
                    "inverse-on-surface": "#c3ffce",
                    "surface-container-high": "#b7f7c3",
                    "secondary-fixed-dim": "#99d4ae",
                    "on-surface": "#00210d",
                    "primary-container": "#d9f99d",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#b3d17a",
                    "on-primary-fixed": "#131f00",
                    "surface-tint": "#4d661c",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface": "#eaffea",
                    "on-secondary-fixed": "#002111",
                    "on-primary-fixed-variant": "#364e03",
                    "error-container": "#ffdad6",
                    "surface-container": "#bcfdc9"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "64px",
                    "margin-desktop": "48px",
                    "margin-mobile": "16px",
                    "base": "8px",
                    "xs": "4px",
                    "md": "24px",
                    "lg": "40px",
                    "sm": "12px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Lexend"],
                    "label-md": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "label-sm": ["Lexend"],
                    "display-lg": ["Lexend"],

                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

          }
        }
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-sans antialiased relative">
<!-- Decorative Organic Background -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-multiply" data-alt="A bright, high-key flat-lay photograph featuring an artistic arrangement of fresh, organic vegetables and leafy greens on a pristine, soft light green surface. The lighting is diffused and natural, emphasizing the vibrant green hues and creating a clean, modern aesthetic indicative of premium produce. The composition intentionally leaves a large, smooth empty space in the center, acting as a canvas for a translucent user interface overlay." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDbzTRH5MPfxXQnED9OhayiGIhydHTVZL2CgybXiVn-iGcwBhA-qLCSGyekLQAVcm_RUpEDJtEv1_dACfRuWo4Utwsq8I5P2LdCjSPImoyUi9-ZwkMLix_Tor9bQei6zL2uFzVk6hMIf55qGhWqNDePckWeNBL3FpIcPmUalFvXnu98oImfdEpYZ05NsZqqwDPlzhQWXpUx0A0uTgqMNLhwXCQa8vYL5qKzl33ZDymr54KIJvNsO7tkF4BM8QHEctyj4Mzaizwus24');">
</div>
<!-- Gradient Overlay to ensure readability and glass effect -->
<div class="absolute inset-0 bg-gradient-to-br from-surface/80 via-surface/60 to-surface-container-low/90 backdrop-blur-[6px]"></div>
</div>
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-base max-w-full mx-auto z-50 fixed top-0 docked full-width border-b border-white/20 bg-white/60 dark:bg-surface-container/60 backdrop-blur-md shadow-[0_4px_30px_rgba(20,83,45,0.05)] shadow-sm dark:shadow-none">
<div class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed-dim">
            Verdant Market
        </div>
<div class="flex items-center gap-2">
<button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-primary-container/40 dark:hover:bg-primary-fixed-dim/20 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Container -->
<main class="flex-1 flex items-center justify-center pt-24 pb-12 px-margin-mobile md:px-margin-desktop relative z-10 w-full">
<!-- Registration Card (Glassmorphism) -->
<div class="w-full max-w-lg bg-surface-container-lowest/70 backdrop-blur-xl border border-white/40 shadow-[0_8px_32px_rgba(20,83,45,0.08)] rounded-xl md:rounded-[24px] p-6 md:p-10">
<!-- Header -->
<div class="text-center mb-8">
<h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg-mobile md:font-headline-lg text-primary mb-2">
                    Tạo tài khoản mới
                </h1>
<p class="text-body-md font-body-md text-on-surface-variant">
                    Tham gia Verdant Market để trải nghiệm nguồn thực phẩm tươi sạch.
                </p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5">
<!-- Full Name Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-primary" for="fullName">Họ và tên</label>
<input class="w-full bg-surface-container-low border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface transition-colors outline-none placeholder:text-outline-variant" id="fullName" placeholder="Nhập họ và tên của bạn" type="text">
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-primary" for="email">Địa chỉ Email</label>
<input class="w-full bg-surface-container-low border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface transition-colors outline-none placeholder:text-outline-variant" id="email" placeholder="ví dụ: tenban@email.com" type="email">
</div>
<!-- Phone Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-primary" for="phone">Số điện thoại</label>
<input class="w-full bg-surface-container-low border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface transition-colors outline-none placeholder:text-outline-variant" id="phone" placeholder="Nhập số điện thoại" type="tel">
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-primary" for="password">Mật khẩu</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 pr-12 text-body-md font-body-md text-on-surface transition-colors outline-none placeholder:text-outline-variant" id="password" placeholder="Tạo mật khẩu" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors flex items-center justify-center p-1" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-primary" for="confirmPassword">Xác nhận mật khẩu</label>
<input class="w-full bg-surface-container-low border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface transition-colors outline-none placeholder:text-outline-variant" id="confirmPassword" placeholder="Nhập lại mật khẩu" type="password">
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-5 mt-0.5">
<input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface-container-lowest cursor-pointer" id="terms" type="checkbox">
</div>
<label class="text-label-sm font-label-sm text-on-surface-variant leading-relaxed cursor-pointer" for="terms">
                        Tôi đồng ý với các <a class="text-primary font-bold hover:underline" href="#">Điều khoản dịch vụ</a> và <a class="text-primary font-bold hover:underline" href="#">Chính sách bảo mật</a> của Verdant Market.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-primary text-on-primary text-label-md font-label-md font-bold py-3.5 px-6 rounded-lg shadow-sm hover:bg-on-primary-container transition-all flex items-center justify-center gap-2 group" type="button">
<span>Đăng ký</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Login Link -->
<div class="mt-8 text-center border-t border-outline-variant/30 pt-6">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Đã có tài khoản? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng nhập</a>
</p>
</div>
</div>
</main>
</body></html>
